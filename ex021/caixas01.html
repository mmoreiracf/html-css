<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            height: 300px;
            width: 300px;
            background-color: #d3d3d3;
            
            border: 10px solid #000000;

            padding: 10px;
            
            margin: 30px;

            outline: 5px dashed #1b1b1ba1 ;
        }


        a{
            border-width: 10px;
            border-style: solid;
            border-color: red;
            padding-top: 5px;
            padding-right: 5px;
            padding-bottom: 5px;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <h1>
        Exemplo de  de Caixas box-level
    </h1>
    <p>paragrafos também são exemplos de box-level mas os <a href="#">links são exemplos de inline-level</a>. Vamos ver como tudo isso funcionar</p>
</body>
</html>
