<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGS HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTMl 5 podemos inserir os elementos da lista a seguir. Passe o mouse em cima de cada elemento para descobrir qual a tag deverá usar para cada um deles.</p>
    <ul type="square">
        <li title="Use a tag P">Paragrafo</li>
        <li title="Use a tag H1-H6">Títulos</li>
        <li title="Use a tag IMG">Imagens</li>
        <li title="Use a tag ABBR">Abreviações</li>
        <li title="Use a tag CODE">Código-Fonte</li>
        <li title="Use a tag OL">Lista numerada</li>
        <li title="Use a tag UL">Lista não numerada</li>
    </ul>
</body>
</html>
