<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML 5</title>
</head>
<body>
    <h1>Inserindos Vídeos hospedados localmente</h1>
    <p>Esse vídeo está hospedado localmente.</p>
    <video width="500" controls 
        src="midia/videos/animação.mp4"
    ></video>

    <h1>Inserindo Vídeos Hospedagem externa</h1>
    <p>Esse vídeo está hospedado em um site externo.</p>
    <h2>Inserindo vídeo do Youtube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/hvMnga-gDW8?si=RVCdUXVPx9cwTeZ-" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
